name: Lint & Validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint stage (parallel)
  # ─────────────────────────────────────────────────────────────────────────

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on non-template scripts
        run: |
          find dot_local/bin -name 'executable_*' ! -name '*.tmpl' -exec sh -c 'for f; do head -1 "$f" | grep -q "python" || shellcheck -e SC2317,SC1128,SC2015 -x "$f" || exit 255; done' sh {} +
      - name: Run ShellCheck on template scripts
        run: |
          for file in $(find . -name '*.sh.tmpl' ! -path './.git/*'); do
            echo "Checking: $file"
            tmp=$(mktemp)
            sed 's/{{[^}]*}}//g' "$file" | awk 'NR==1 && /^$/ {next} {print}' > "$tmp"
            shellcheck -e SC2317,SC1128,SC2015 -x -s bash "$tmp" || exit 1
            rm "$tmp"
          done

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          find . -name '*.yml' -o -name '*.yaml' | \
            grep -v '.git/' | grep -v 'node_modules/' | \
            grep -v 'private_hosts.yml' | \
            xargs yamllint -c .yamllint.yml

  validate-json:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          find . -name '*.json' ! -path './.git/*' ! -path '*/zed/*.json' ! -path '*/Code/User/*.json' ! -name '*.tmpl' | while read -r file; do
            echo "Validating: $file"
            python3 -m json.tool "$file" > /dev/null
          done

  shfmt:
    name: Shell Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          curl -sS https://webinstall.dev/shfmt | bash
          # Path already includes /opt/homebrew/bin
      - name: Check shell formatting
        run: |
          # Path already includes /opt/homebrew/bin
          find dot_local/bin -name 'executable_*' ! -name '*.tmpl' -exec sh -c 'for f; do head -1 "$f" | grep -q "python" || shfmt -d -i 2 -ci "$f" || exit 255; done' sh {} +

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff on Python scripts
        run: |
          find dot_local/bin -name 'executable_*' -exec file {} + | \
            grep -i python | cut -d: -f1 | \
            xargs -r ruff check --select E,F,W

  # ─────────────────────────────────────────────────────────────────────────
  # Test stage (needs: lint stage)
  # ─────────────────────────────────────────────────────────────────────────

  bats:
    name: BATS Tests
    needs: [shellcheck, shfmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install BATS
        run: sudo apt-get install -y bats yq jq curl git && (sh -c "$(curl -fsLS https://get.chezmoi.io)" || true) && sudo mv ./bin/chezmoi /usr/local/bin/ || echo "chezmoi skip"
      - name: Run BATS tests
        run: |
          echo "PATH: $PATH"
          which chezmoi || echo "no chezmoi"
          which yq || echo "no yq"
          ls -R dot_local/bin/
          bats tests/*.bats

  pytest:
    name: Python Tests
    needs: [python-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pytest
      - run: python -m pytest tests/ -q

  template-check:
    name: Template Validation
    needs: [shellcheck, yamllint, validate-json]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)"
      - name: Validate templates parse
        run: |
          find . -name '*.tmpl' ! -path './.git/*' | while read -r file; do
            echo "Checking template syntax: $file"
            opens=$(grep -o '{{' "$file" | wc -l)
            closes=$(grep -o '}}' "$file" | wc -l)
            if [ "$opens" -ne "$closes" ]; then
              echo "ERROR: Unbalanced template delimiters in $file ({{ = $opens, }} = $closes)"
              exit 1
            fi
          done
          echo "All templates have balanced delimiters"

  doc-lint:
    name: Doc References
    needs: [shellcheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for stale function references
        run: |
          if grep -rn 'maintain()\|maintain-quick\|cache-sizes()' docs/ README.md 2>/dev/null; then
            echo "Found stale function references in docs"
            exit 1
          fi
          echo "No stale references found"

  # ─────────────────────────────────────────────────────────────────────────
  # Integration stage (needs: test stage)
  # ─────────────────────────────────────────────────────────────────────────

  integration-macos:
    name: macOS Integration
    needs: [bats, pytest]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: brew install chezmoi
      - name: Setup CI chezmoi config
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          echo "[data]" > "$HOME/.config/chezmoi/chezmoi.toml"
          echo "has_aws_credentials = false" >> "$HOME/.config/chezmoi/chezmoi.toml"
          echo "domus_auto_enabled = false" >> "$HOME/.config/chezmoi/chezmoi.toml"
          echo "is_work = false" >> "$HOME/.config/chezmoi/chezmoi.toml"
          echo "is_ci = true" >> "$HOME/.config/chezmoi/chezmoi.toml"
          echo "name = \"CI Runner\"" >> "$HOME/.config/chezmoi/chezmoi.toml"
          echo "email = \"ci@example.com\"" >> "$HOME/.config/chezmoi/chezmoi.toml"
          echo "ssh_signing_key = \"ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI...\"" >> "$HOME/.config/chezmoi/chezmoi.toml"
      - name: Run chezmoi init + apply
        run: |
          # Path already includes /opt/homebrew/bin
          chezmoi init --apply --source="$GITHUB_WORKSPACE"
      - name: Validate key files exist
        run: |
          echo "Checking rendered files..."
          test -f "$HOME/.claude/CLAUDE.md" && echo "✓ CLAUDE.md"
          test -f "$HOME/.config/ai-instructions/copilot-instructions.md" && echo "✓ copilot-instructions.md"
          test -f "$HOME/.local/bin/domus" && echo "✓ domus"
          test -f "$HOME/.local/bin/domus-lib.sh" && echo "✓ domus-lib.sh"
          test -f "$HOME/.local/bin/domus-ai-config-check" && echo "✓ domus-ai-config-check"
          test -f "$HOME/.local/bin/domus-version-check" && echo "✓ domus-version-check"
          echo "All key files present"

  gitleaks:
    name: Secret Scanning
    needs: [bats, pytest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  version-sync:
    name: Version Sync
    needs: [bats, pytest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check DOMUS_VERSION matches CHANGELOG
        run: bash dot_local/bin/executable_domus-version-check

  ai-config-parity:
    name: AI Config Parity
    needs: [template-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check AI config fragment parity
        run: bash dot_local/bin/executable_domus-ai-config-check .
