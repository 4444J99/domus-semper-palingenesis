# seed.yaml — Automation Contract for 4444J99/domus-semper-palingenesis
# Schema: seed/v1.0
# IRF-DOM-001

schema_version: "1.0"
organ: Liminal
organ_name: Liminal
repo: domus-semper-palingenesis
org: 4444J99

metadata:
  implementation_status: ACTIVE
  tier: infrastructure
  promotion_status: GRADUATED
  last_validated: "2026-04-18"
  language: shell
  note: >-
    The operator's machine configuration — shell environment, tool setup,
    secrets management, agent infrastructure. Managed by chezmoi with
    autoCommit + autoPush. If domus breaks, every organ loses its shell,
    secrets, and context files. Registered in PERSONAL section of
    registry-v2.json (IRF-DOM-002, 2026-04-13).

produces:
  - type: environment-config
    description: "Shell environment, PATH, XDG dirs, tool initialization (50ms startup, S32 rewrite)"
    consumers: [ALL]
  - type: agent-infrastructure
    description: "Claude/Gemini/Codex agent configuration, MCP servers, LaunchAgents, agent-dispatch CLI (6 agents, --skip-git-repo-check for Codex)"
    consumers: [ORGAN-IV, META-ORGANVM]
  - type: secrets-management
    description: "1Password CLI integration, API key provisioning via op-refresh"
    consumers: [ALL]
  - type: cache-primitive
    description: "_domus_cache_init — DRY shell init caching for tool startup"
    consumers: [ALL]
  - type: self-heal
    description: "chezmoi self-heal daemon + domus-maintain for autonomous environment recovery"
    consumers: [ALL]
  - type: memory-parity
    description: "Claude memory files tracked via chezmoi (460 files, [(local):(remote)={1:1}])"
    consumers: [ALL]
  - type: claude-code-config
    description: "Claude Code settings.json: PreToolUse outbound-action hooks, plugin registry, statusLine — managed as private_dot_claude/settings.json.tmpl (GH#26, IRF-DOM-031)"
    consumers: [ALL]

consumes:
  - type: skills
    description: "AI skills from a-i--skills"
    producers: [ORGAN-IV]
  - type: governance-policy
    description: "System governance rules and standards"
    producers: [META-ORGANVM]
  - type: cloud-storage
    description: "Dropbox, Google Drive, Backblaze (Homebrew casks, not org repos)"
    producers: [EXTERNAL]
