GOOSE_PROVIDER: ollama
GOOSE_MODEL: qwen2.5:3b
GOOSE_ENABLE_ROUTER: 'true'
GOOSE_MODE: auto
GOOSE_CONTEXT_STRATEGY: compact
GOOSE_AUTO_COMPACT_THRESHOLD: 0.9
extensions:
  developer:
    enabled: true
    type: builtin
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    timeout: null
    bundled: true
    available_tools: []
  todo:
    enabled: true
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  chatrecall:
    enabled: true
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  extensionmanager:
    enabled: true
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  computercontroller:
    enabled: true
    type: builtin
    name: computercontroller
    description: General computer control tools that don't require you to be a developer or engineer.
    display_name: Computer Controller
    timeout: 300
    bundled: true
    available_tools: []
  autovisualiser:
    enabled: false
    type: builtin
    name: autovisualiser
    description: Data visualization and UI generation tools
    display_name: Auto Visualiser
    timeout: 300
    bundled: true
    available_tools: []
  memory:
    enabled: true
    type: builtin
    name: memory
    description: Teach goose your preferences as you go.
    display_name: Memory
    timeout: 300
    bundled: true
    available_tools: []
  tutorial:
    enabled: true
    type: builtin
    name: tutorial
    description: Access interactive tutorials and guides
    display_name: Tutorial
    timeout: 300
    bundled: true
    available_tools: []
  chromedevtools:
    enabled: false
    type: stdio
    name: Chrome DevTools
    description: Control and inspect a live Chrome browser
    cmd: npx
    args:
    - -y
    - chrome-devtools-mcp@latest
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  context7:
    enabled: false
    type: stdio
    name: Context7
    description: Use up-to-date code and docs
    cmd: npx
    args:
    - -y
    - '@upstash/context7-mcp'
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  fetch:
    enabled: false
    type: stdio
    name: Fetch
    description: Web content fetching and processing capabilities
    cmd: uvx
    args:
    - mcp-server-fetch
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  dev.to:
    enabled: false
    type: streamable_http
    name: Dev.to
    description: Access Dev.to articles and content (requires local server setup)
    uri: http://localhost:3000/mcp
    envs: {}
    env_keys: []
    headers: {}
    timeout: 300
    bundled: null
    available_tools: []
  gitmcp:
    enabled: false
    type: stdio
    name: GitMCP
    description: Gets latest documentation for any GitHub project
    cmd: npx
    args:
    - -y
    - mcp-remote
    - https://gitmcp.io/docs
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  goosedocs:
    enabled: false
    type: stdio
    name: goose Docs
    description: GitMCP for goose documentation
    cmd: npx
    args:
    - mcp-remote
    - https://block.gitmcp.io/goose/
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  knowledgegraphmemory:
    enabled: false
    type: stdio
    name: Knowledge Graph Memory
    description: Graph-based memory system for persistent knowledge storage
    cmd: npx
    args:
    - -y
    - '@modelcontextprotocol/server-memory'
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  pdfreader:
    enabled: false
    type: stdio
    name: PDF Reader
    description: Read large and complex PDF documents
    cmd: uvx
    args:
    - mcp-read-pdf
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  playwright:
    enabled: false
    type: stdio
    name: Playwright
    description: Interact with web pages through structured accessibility snapshots using Playwright
    cmd: npx
    args:
    - '@playwright/mcp@latest'
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  repomix:
    enabled: false
    type: stdio
    name: Repomix
    description: Repository analysis and code organization
    cmd: npx
    args:
    - -y
    - repomix-mcp
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  selenium:
    enabled: false
    type: stdio
    name: Selenium
    description: Web browser automation and testing
    cmd: npx
    args:
    - -y
    - selenium-mcp
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  supabase:
    enabled: false
    type: streamable_http
    name: Supabase
    description: Connect your Supabase projects to AI assistants. Manage tables, query data, deploy Edge Functions, and interact with your Supabase backend directly from your MCP client.
    uri: https://mcp.supabase.com/mcp
    envs: {}
    env_keys: []
    headers: {}
    timeout: 300
    bundled: null
    available_tools: []
  mcpdocker:
    args:
    - mcp
    - gateway
    - run
    bundled: null
    cmd: docker
    description: The Docker MCP Toolkit allows for easy configuration and consumption of MCP servers from the Docker MCP Catalog
    enabled: true
    env_keys: []
    envs: {}
    name: mcpdocker
    timeout: 300
    type: stdio
  serena:
    enabled: true
    type: stdio
    name: Serena
    description: Code-aware analysis and semantic editing
    cmd: uvx
    args:
    - '--from'
    - 'git+https://github.com/4444J99/serena'
    - serena
    - start-mcp-server
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  jupyter:
    enabled: true
    type: stdio
    name: Jupyter
    description: Jupyter notebook MCP server
    cmd: jupyter-mcp-server
    args: []
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  apps:
    enabled: true
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  summon:
    enabled: true
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  tom:
    enabled: true
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  analyze:
    enabled: true
    type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
OLLAMA_HOST: http://localhost:11434
OLLAMA_TIMEOUT: '600'
GOOSE_TELEMETRY_ENABLED: true
