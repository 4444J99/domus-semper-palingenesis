# Gemini CLI auto-saved policy rules
# Builtins: run_shell_command, read_file, write_file, write_todos

# --- Built-in file tools ---

[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "write_file"
decision = "allow"
priority = 100

# --- Shell commands ---

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [ "ls", "head", "pwd", "cat", "echo", "tail" ]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [ "mkdir", "mv", "python" ]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [ "git" ]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [ "ps", "grep", "pgrep", "killall" ]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [ "sleep", "sudo", "launchctl" ]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [ "brctl", "df", "log", "fileproviderctl" ]
