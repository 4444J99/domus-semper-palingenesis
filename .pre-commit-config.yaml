repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.tmpl$|/plans/|\.txt$|private_dot_claude/'
      - id: end-of-file-fixer
        exclude: '\.tmpl$|/plans/|\.txt$|private_dot_claude/'
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: 'private_hosts\.yml$'
      - id: check-json
        exclude: '\.tmpl$|zed/|Code/User/'
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: shellcheck
        name: ShellCheck
        entry: shellcheck -e SC2317,SC1128,SC2015 -x
        language: system
        types: [shell]
        exclude: '\.tmpl$|dot_config/zsh/|private_dot_claude/hooks/'
        files: 'dot_local/bin/executable_'

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ['-i', '2', '-ci']
        exclude: '\.tmpl$|dot_config/zsh/'
        files: 'dot_local/bin/executable_'

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ['-c', '.yamllint.yml']
        exclude: 'private_hosts\.yml$'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: version-sync
        name: Check DOMUS_VERSION matches CHANGELOG
        entry: bash -c 'dot_local/bin/executable_domus-version-check'
        language: system
        files: '(executable_domus|CHANGELOG\.md)$'
